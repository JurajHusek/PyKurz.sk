services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/course_portal.db
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      JWT_SECRET: dev-change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - ./backend/data:/data
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend-next-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- -H 0.0.0.0 -p 5173

volumes:
  frontend-next-node-modules:
